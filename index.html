<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast - Ética e Trabalho</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1 class="main-title">Voz<span class="microfone">🎙️</span>Consciência</h1>
  <div class="container">
    <h2 class="episode-title">Ética e o Mundo do Trabalho</h2>

    <p>Uma reflexão sobre ética, moral e o mundo do trabalho</p>

    <div class="player">
      <!-- CD -->
      <img src="img/disco.png" class="cd" id="cd" />

      <!-- Onda -->
      <div class="wave">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="controls">
        <div class="progress-container">
          <input type="range" id="progress" value="0">
          <div class="time-display">
            <span id="current-time">00:00</span>
            <span id="total-duration">00:00</span>
          </div>
        </div>

        <div class="buttons-container">
          <button onclick="skip(-10)"><img src="img/rewind.png" class="btn-sm"></button>
          <button onclick="toggleAudio()" id="btn"><img src="img/play.png" id="iconPlay" class="btn-lg"></button>
          <button onclick="skip(10)"><img src="img/forward.png" class="btn-sm"></button>
        </div>

        <div class="volume-box">
          <img src="img/volume.png" id="iconVolume">
          <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
    <!-- ÁUDIO -->
    <audio id="audio" src="audio/PodCast.wav"></audio>
  </div>
  </div>
  <footer class="footer">
    <p>© 2026 Wergiley Oliveira. Todos os direitos reservados.</p>
  </footer>
  <script src="script.js"></script>
</body>

</html>
