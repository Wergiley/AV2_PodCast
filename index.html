<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast - Ética e Trabalho</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="main-title">Voz<span class="microfone">🎙️</span>Consciência</h1>
    <div class="container">
      <h2 class="episode-title">Ética e o Mundo do Trabalho</h2>

      <p>Uma reflexão sobre ética, moral e o mundo do trabalho</p>

      <div class="player">
        <!-- CD -->
        <img src="img/disco.png" class="cd" id="cd" />

        <!-- Onda -->
        <div class="wave">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="controls">
          <div class="main-controls">
            <!-- BOTÃO COM ÍCONE -->
            <button onclick="skip(-10)">
              <img src="img/rewind.png" style="width: 30px; height: 30px" />
            </button>
            <button onclick="toggleAudio()" id="btn">
              <img src="img/play.png" id="iconPlay" />
            </button>
            <button onclick="skip(10)">
              <img src="img/forward.png" style="width: 30px; height: 30px" />
            </button>

            <!-- PROGRESSO -->
            <input type="range" id="progress" value="0" />

            <!-- TEMPO -->
            <p id="time">00:00 / 00:00</p>
          </div>

          <!-- VOLUME -->
          <div class="volume">
            <!-- ÍCONE CLICÁVEL -->
            <img src="img/volume.png" id="iconVolume" class="icon-volume" />

            <!-- BARRA (fica escondida) -->
            <input
              type="range"
              id="volume"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />
          </div>
        </div>

        <!-- ÁUDIO -->
        <audio id="audio" src="audio/PodCast.wav"></audio>
      </div>
    </div>
    <footer class="footer">
      <p>© 2026 Wergiley Oliveira. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
